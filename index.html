<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointyBois Transit Center</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 10px; 
            margin: 0;
        }

        /* Board becomes flexible */
        .board { 
            border: 2px solid #444; 
            background: #111; 
            padding: 12px; 
            width: 95%; 
            max-width: 450px; /* Limits size on desktop */
            border-radius: 12px; 
            margin: 10px auto 20px auto; 
            box-sizing: border-box;
        }

        .header { 
            border-bottom: 2px solid #444; 
            margin-bottom: 12px; 
            padding-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
        }

        .header h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .sb-theme { color: #FF99EB; }
        .nb-theme { color: #00f2ff; }

        .arrival-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #222; 
        }
        
        /* Fixed-Width Badge */
        .route-num { 
            width: 50px; 
            height: 32px; 
            line-height: 32px; 
            font-weight: bold; 
            border-radius: 6px; 
            text-align: center; 
            font-size: 18px; 
            color: #fff; 
            flex-shrink: 0; 
        }

        .bg-40 { background: #18A300; } 
        .bg-28 { background: #1127EE; } 
        .bg-d  { background: #EE1127; } 
        .bg-default { background: #333; }
        
        .destination { 
            flex-grow: 1; 
            padding-left: 12px; 
            font-size: 15px; 
            color: #eee; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            min-width: 0; 
        }

        .stop-label { font-size: 11px; color: #888; display: block; margin-top: 2px; }
        
        .minutes { 
            font-size: 20px; 
            font-weight: 800; 
            width: 90px; 
            text-align: right; 
            flex-shrink: 0; 
        }
        
        .too-late-mins { color: #808080 !important; }
        .realtime-icon { color: #39ff14; font-size: 12px; margin-left: 4px; }
        .status-text { font-size: 10px; color: #555; }

        /* Tablet/Desktop optimization */
        @media (min-width: 600px) {
            body { padding: 40px; }
            .header h1 { font-size: 1.3rem; }
            .destination { font-size: 17px; }
            .minutes { font-size: 24px; }
        }
    </style>
</head>
